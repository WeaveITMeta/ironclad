<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#cffafe" stop-opacity="1"/>
      <stop offset="35%" stop-color="#22d3ee" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark backdrop disc so favicon reads on light/dark tabs -->
  <circle cx="32" cy="32" r="31" fill="#020617"/>

  <g filter="url(#glow)">
    <!-- Outer dashed ring -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>

    <!-- Phase tick marks (12 around) -->
    <g stroke="#22d3ee" stroke-width="1.4">
      <line x1="32" y1="3"  x2="32" y2="7"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(30 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(60 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(90 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(120 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(150 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(180 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(210 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(240 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(270 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(300 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(330 32 32)"/>
    </g>

    <!-- Middle broken ring -->
    <circle cx="32" cy="32" r="22" fill="none" stroke="#67e8f9" stroke-width="1.4" stroke-dasharray="13 4 19 4" opacity="0.9"/>

    <!-- Inner ring -->
    <circle cx="32" cy="32" r="16" fill="none" stroke="#22d3ee" stroke-width="0.8" opacity="0.7"/>

    <!-- Nine segmented plates around the core (the classic arc-reactor look) -->
    <g fill="none" stroke="#a5f3fc" stroke-width="1.2" opacity="0.85">
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(0 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(40 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(80 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(120 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(160 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(200 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(240 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(280 32 32)"/>
      <path d="M 32 18 L 28 22 L 36 22 Z" transform="rotate(320 32 32)"/>
    </g>

    <!-- Core disc -->
    <circle cx="32" cy="32" r="10" fill="url(#core)" stroke="#22d3ee" stroke-width="1.4"/>
    <!-- Inner glow point -->
    <circle cx="32" cy="32" r="4" fill="#ecfeff" opacity="0.9"/>
  </g>
</svg>
