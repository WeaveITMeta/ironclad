<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ecfeff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#a5f3fc" stop-opacity="0.95"/>
      <stop offset="70%" stop-color="#22d3ee" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.55"/>
    </radialGradient>
    <radialGradient id="coreInner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ecfeff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a5f3fc" stop-opacity="0.6"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark backdrop disc -->
  <circle cx="32" cy="32" r="31" fill="#020617"/>

  <g filter="url(#glow)">
    <!-- Outer dashed ring (instrument scale) -->
    <circle cx="32" cy="32" r="29" fill="none" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="1.5 1.5" opacity="0.65"/>

    <!-- 12 evenly-spaced tick marks around the perimeter -->
    <g stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round">
      <line x1="32" y1="3"  x2="32" y2="7"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(30 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(60 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(90 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(120 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(150 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(180 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(210 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(240 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(270 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(300 32 32)"/>
      <line x1="32" y1="3"  x2="32" y2="7" transform="rotate(330 32 32)"/>
    </g>

    <!-- Middle ring -->
    <circle cx="32" cy="32" r="23" fill="none" stroke="#67e8f9" stroke-width="1" opacity="0.85"/>

    <!-- Inner ring -->
    <circle cx="32" cy="32" r="17" fill="none" stroke="#22d3ee" stroke-width="0.7" opacity="0.7"/>

    <!-- 9 capacitor dots arranged in a perfect circle around the core
         (replaces the previous triangular plates that looked like
          woven squares when stacked with a counter-rotating layer) -->
    <g fill="#a5f3fc" opacity="0.95">
      <circle cx="32" cy="18" r="1.8"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(40 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(80 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(120 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(160 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(200 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(240 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(280 32 32)"/>
      <circle cx="32" cy="18" r="1.8" transform="rotate(320 32 32)"/>
    </g>

    <!-- Outer core disc -->
    <circle cx="32" cy="32" r="11" fill="url(#core)" stroke="#22d3ee" stroke-width="1.2"/>

    <!-- Inner core highlight — a softer, perfectly round bloom -->
    <circle cx="32" cy="32" r="6" fill="url(#coreInner)"/>

    <!-- Center pinpoint -->
    <circle cx="32" cy="32" r="2" fill="#ffffff"/>
  </g>
</svg>
