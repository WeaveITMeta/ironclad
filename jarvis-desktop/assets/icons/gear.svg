<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
  <!-- 6-tooth precision gear: paired tangent lines per tooth for an
       engineered look that matches the arc reactor's plating. Each
       pair sits at 60° intervals; the slight cap on the outer edge
       reads as a flat tooth face when rendered at 16-24 px. -->
  <g>
    <!-- 0° (top) -->
    <path d="M11 2.4 L11 5.2 M13 2.4 L13 5.2 M11 2.4 L13 2.4"/>
    <!-- 60° -->
    <path d="M17.95 4.55 L15.51 5.95 M18.95 6.28 L16.51 7.68 M17.95 4.55 L18.95 6.28"/>
    <!-- 120° -->
    <path d="M21.6 11 L18.8 11 M21.6 13 L18.8 13 M21.6 11 L21.6 13"/>
    <!-- 180° (bottom) -->
    <path d="M13 21.6 L13 18.8 M11 21.6 L11 18.8 M13 21.6 L11 21.6"/>
    <!-- 240° -->
    <path d="M6.05 19.45 L8.49 18.05 M5.05 17.72 L7.49 16.32 M6.05 19.45 L5.05 17.72"/>
    <!-- 300° -->
    <path d="M2.4 13 L5.2 13 M2.4 11 L5.2 11 M2.4 13 L2.4 11"/>
  </g>
  <!-- Outer rim — a perfect circle, scaled so the teeth tangent it cleanly. -->
  <circle cx="12" cy="12" r="6.5"/>
  <!-- Inner ring (the bore where the arc reactor core lives) -->
  <circle cx="12" cy="12" r="3"/>
  <!-- Filled hub spot — small bright center for visual weight -->
  <circle cx="12" cy="12" r="1.1" fill="currentColor" stroke="none"/>
</svg>
